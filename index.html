<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stamped — Work together. Honestly.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#180B33;
  --ink-2:#28174F;
  --ink-3:#3D2470;
  --ink-line:#5A3A96;
  --parchment:#F3F1FC;
  --parchment-2:#FCFAFF;
  --stamp:#FF2E88;
  --stamp-dark:#D6006B;
  --gold:#FFB020;
  --success:#00C896;
  --success-bg:#D1FAE5;
  --warn:#D97706;
  --text-ink:#1E1633;
  --text-muted-dark:#D6CDF7;
  --text-muted-light:#6B6285;
  --accent2:#00D4FF;
  --lime:#B4FF39;
  --gradient-brand:linear-gradient(135deg, #FF2E88 0%, #9333EA 55%, #6D28D9 100%);
  --gradient-cool:linear-gradient(135deg, #00D4FF 0%, #9333EA 100%);
  --glass-bg:rgba(252,250,255,.85);
  --glass-border:rgba(255,255,255,.5);
  --radius:12px;
  --serif:'Space Grotesk', sans-serif;
  --sans:'Inter', sans-serif;
  --mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--sans);background:radial-gradient(ellipse 1200px 800px at 15% -10%, #3D2470 0%, transparent 55%), radial-gradient(ellipse 900px 700px at 110% 10%, #5A1E6B 0%, transparent 50%), var(--ink);color:var(--text-muted-dark);}
::selection{background:var(--stamp);color:white;}
:focus-visible{outline:2px solid var(--accent2);outline-offset:2px;border-radius:4px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;} }

/* ---------- shell ---------- */
.app{min-height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:linear-gradient(120deg, var(--ink-2) 0%, var(--ink-3) 100%);border-bottom:1px solid var(--ink-line);flex-wrap:wrap;gap:12px;}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand-mark{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:0.5px;background:var(--gradient-brand);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand-mark span{background:var(--gradient-cool);-webkit-background-clip:text;background-clip:text;color:transparent;}
.auth-shell::before,.auth-shell::after{content:'';position:absolute;border-radius:50%;filter:blur(90px);opacity:.55;z-index:0;pointer-events:none;animation:float-blob 14s ease-in-out infinite;}
.auth-shell::before{width:440px;height:440px;background:radial-gradient(circle, #FF2E88 0%, transparent 70%);top:-140px;left:-120px;}
.auth-shell::after{width:500px;height:500px;background:radial-gradient(circle, #00D4FF 0%, transparent 70%);bottom:-180px;right:-140px;animation-delay:-7s;}
@keyframes float-blob{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(35px,-25px) scale(1.1);}}
.brand-tag{font-size:11px;color:var(--text-muted-dark);letter-spacing:0.3px;font-style:italic;font-family:var(--serif);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.role-switch{display:flex;align-items:center;gap:8px;background:var(--ink);border:1px solid var(--ink-line);border-radius:20px;padding:5px 12px 5px 5px;}
.account-select{background:transparent;border:none;color:var(--parchment-2);font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;outline:none;max-width:220px;}
.account-select option{background:var(--ink-2);color:var(--parchment-2);}
.role-btn{border:none;background:transparent;color:var(--text-muted-dark);font-family:var(--sans);font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:18px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;}
.role-btn.active{background:var(--parchment-2);color:var(--text-ink);}
.avatar-dot{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;box-shadow:0 0 0 2px rgba(255,255,255,.15);}
.tier-pill{font-family:var(--mono);font-size:10.5px;padding:4px 11px;border-radius:999px;border:1px solid var(--ink-line);color:var(--text-muted-dark);text-transform:uppercase;letter-spacing:.5px;}
.tier-pill.pro{border-color:var(--gold);color:var(--gold);}

.body-wrap{flex:1;display:flex;min-height:0;}
.sidebar{width:280px;flex-shrink:0;background:linear-gradient(180deg, var(--ink-2) 0%, var(--ink) 100%);border-right:1px solid var(--ink-line);display:flex;flex-direction:column;padding:18px 14px;gap:18px;overflow-y:auto;}
.sidebar-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted-dark);opacity:.6;padding:0 6px;margin-bottom:8px;font-weight:600;}

.rep-card{background:var(--ink-3);border:1px solid var(--ink-line);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden;}
.rep-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-brand);}
.rep-card-name{font-family:var(--serif);font-size:16px;color:var(--parchment-2);font-weight:600;}
.rep-card-role{font-size:11px;color:var(--text-muted-dark);margin-bottom:10px;}
.badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.badge{font-family:var(--mono);font-size:9.5px;padding:3px 9px;border-radius:999px;background:rgba(255,176,32,.15);border:1px solid var(--gold);color:var(--gold);letter-spacing:.3px;}
.badge.none{opacity:.4;border-style:dashed;color:var(--text-muted-dark);border-color:var(--ink-line);}
.rep-score-note{font-size:10.5px;color:var(--text-muted-dark);opacity:.7;margin-top:8px;line-height:1.4;}

.project-list{display:flex;flex-direction:column;gap:6px;}
.project-item{background:var(--ink-3);border:1px solid var(--ink-line);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;}
.project-item:hover{border-color:var(--stamp);transform:translateX(2px);box-shadow:0 4px 14px rgba(255,46,136,.18);}
.project-item.active{border-color:var(--stamp);background:var(--ink);box-shadow:0 0 0 1px var(--stamp);}
.project-item-title{font-size:13px;font-weight:600;color:var(--parchment-2);margin-bottom:3px;}
.project-item-meta{font-size:10.5px;color:var(--text-muted-dark);font-family:var(--mono);}
.new-project-btn{width:100%;padding:10px;background:none;border:1px dashed var(--ink-line);color:var(--text-muted-dark);border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--sans);transition:.15s;}
.new-project-btn:hover{border-color:var(--gold);color:var(--gold);border-style:solid;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--parchment-2);color:var(--text-ink);}
.main-header{padding:18px 28px;border-bottom:1px solid #E3DFF7;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.main-title{font-family:var(--serif);font-size:22px;font-weight:600;}
.main-sub{font-size:12px;color:var(--text-muted-light);margin-top:3px;font-family:var(--mono);}
.tabs{display:flex;gap:4px;padding:8px 28px 0;background:var(--parchment-2);border-bottom:1px solid #E3DFF7;}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--text-muted-light);cursor:pointer;border-radius:999px 999px 0 0;transition:.15s;}
.tab:hover{color:var(--stamp);background:rgba(255,46,136,.06);}
.tab.active{color:var(--stamp);background:rgba(255,46,136,.08);box-shadow:inset 0 -3px 0 var(--stamp);}
.tab-count{font-family:var(--mono);font-size:10px;background:#E3DFF7;padding:1px 6px;border-radius:8px;margin-left:5px;}

.panel{flex:1;overflow-y:auto;padding:24px 28px 60px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--text-muted-light);gap:10px;padding:60px 20px;}
.empty-state h3{font-family:var(--serif);font-size:20px;color:var(--text-ink);font-weight:600;margin:0;}

/* ---------- chat ---------- */
.chat-scroll{display:flex;flex-direction:column;gap:10px;max-width:720px;margin:0 auto;}
.msg{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;position:relative;}
.msg.mine{align-self:flex-end;background:var(--gradient-brand);color:white;border-bottom-right-radius:4px;}
.msg.theirs{align-self:flex-start;background:white;border:1px solid #E3DFF7;border-bottom-left-radius:4px;}
.msg-meta{font-family:var(--mono);font-size:9.5px;opacity:.55;margin-top:4px;}
.chat-input-row{max-width:720px;margin:14px auto 0;display:flex;gap:8px;}
.chat-input{flex:1;padding:12px 14px;border:1px solid #D6CFF0;border-radius:var(--radius);font-family:var(--sans);font-size:14px;background:white;}
.send-btn{padding:0 20px;background:var(--gradient-brand);color:white;border:none;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:13px;transition:transform .12s ease,box-shadow .12s ease;box-shadow:0 2px 10px rgba(255,46,136,.3);}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,46,136,.4);}
.send-btn:hover{background:var(--stamp-dark);}

.suggestion-card{max-width:720px;margin:6px auto;background:white;border:1.5px dashed var(--stamp);border-radius:14px;padding:16px 18px;box-shadow:0 4px 20px rgba(255,46,136,.08);}
.suggestion-label{font-family:var(--mono);font-size:10px;color:var(--stamp);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.suggestion-label::before{content:'●';animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.agreement-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.field{display:flex;flex-direction:column;gap:3px;}
.field.full{grid-column:1/-1;}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted-light);font-weight:600;}
.field input,.field textarea{border:1px solid #E3DFF7;border-radius:8px;padding:7px 9px;font-family:var(--sans);font-size:13px;background:var(--parchment-2);}
.confirm-row{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap;}
.btn{border:none;border-radius:var(--radius);padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--sans);letter-spacing:.2px;transition:transform .12s ease,box-shadow .12s ease,background .15s ease;}
.btn-stamp{background:var(--gradient-brand);color:white;box-shadow:0 2px 10px rgba(255,61,129,.35);}
.btn-stamp:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,61,129,.45);}
.btn-ghost{background:rgba(255,46,136,.05);border:1px solid #D6CFF0;color:var(--text-ink);}
.btn-ghost:hover{border-color:var(--stamp);color:var(--stamp);background:rgba(255,46,136,.1);}
.btn-success{background:var(--success);color:white;box-shadow:0 2px 10px rgba(5,150,105,.3);}
.btn-success:hover{background:#00A67D;transform:translateY(-1px);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
.agree-status{font-size:11px;font-family:var(--mono);color:var(--text-muted-light);}
.agree-status b{color:var(--success);}

/* ---------- milestones ---------- */
.ms-list{display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;}
.ms-toolbar{max-width:760px;margin:0 auto 16px;display:flex;justify-content:flex-end;}
.ms-card{background:white;border:1px solid #E3DFF7;border-radius:14px;overflow:hidden;transition:box-shadow .15s ease,transform .15s ease;box-shadow:0 1px 3px rgba(61,36,112,.06);}
.ms-card:hover{box-shadow:0 8px 24px rgba(61,36,112,.12);}
.ms-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px;flex-wrap:wrap;}
.ms-head-left{display:flex;align-items:center;gap:12px;}
.ms-name{font-family:var(--serif);font-weight:600;font-size:16px;}
.ms-amount{font-family:var(--mono);font-size:13px;color:var(--text-muted-light);}
.status-pill{font-family:var(--mono);font-size:9.5px;padding:4px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;white-space:nowrap;}
.s-active{background:#E5E3FF;color:#4F46E5;}
.s-new{background:#FEF3C7;color:var(--warn);}
.s-completed{background:var(--success-bg);color:var(--success);}
.s-disputed{background:#FFE1EA;color:#DC2626;}
.risk-low{color:var(--success);}
.risk-medium{color:var(--warn);}
.risk-high{color:var(--stamp-dark);font-weight:700;}
.dash-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.dash-link{font-size:12.5px;color:var(--stamp);cursor:pointer;text-decoration:underline;}
.dash-table{width:100%;border-collapse:collapse;background:white;border:1px solid #E3DFF7;border-radius:14px;overflow:hidden;font-size:13px;box-shadow:0 1px 3px rgba(61,36,112,.06);}
.dash-table th{text-align:left;background:linear-gradient(120deg, var(--ink) 0%, var(--ink-3) 100%);color:var(--parchment-2);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:12px;font-weight:600;}
.dash-table td{padding:12px;border-top:1px solid #EFEAFB;vertical-align:middle;transition:.15s;}
.dash-table tr:hover td{background:rgba(255,46,136,.04);}
.pct-wrap{display:flex;align-items:center;gap:6px;}
.pct-bar{width:52px;height:6px;border-radius:999px;background:#ECE7FA;overflow:hidden;flex-shrink:0;}
.pct-bar-fill{height:100%;background:var(--gradient-cool);border-radius:999px;}
.pct-bar-fill.mid{background:var(--gold);}
.pct-label{font-family:var(--mono);font-size:11px;color:var(--text-muted-light);}
.row-link{color:var(--stamp);cursor:pointer;text-decoration:underline;}
.back-link{font-size:12px;color:var(--text-muted-light);cursor:pointer;padding:10px 28px 0;}
.back-link:hover{color:var(--stamp);}
.s-suggested{background:#FEF3C7;color:var(--warn);}
.s-locked{background:#E5E3FF;color:#4F46E5;}
.s-submitted{background:#E5E3FF;color:#4F46E5;}
.s-revision{background:#FFE1EA;color:var(--stamp-dark);}
.s-paid{background:#FEF3C7;color:var(--gold);}
.s-released{background:var(--success-bg);color:var(--success);}
.s-dispute{background:#FFE1EA;color:#DC2626;}
.ms-body{padding:0 18px 18px;border-top:1px solid #EFEAFB;display:flex;flex-direction:column;gap:12px;}
.ms-desc{font-size:13px;color:var(--text-muted-light);line-height:1.5;}
.ms-meta-row{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--text-muted-light);}
.ms-meta-row span{background:var(--parchment);border:1px solid #E3DFF7;padding:5px 11px;border-radius:999px;}
.ms-meta-row span b{color:var(--stamp-dark);}
.ms-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.note-box{background:linear-gradient(180deg, rgba(255,46,136,.04) 0%, var(--parchment-2) 60%);border:1px solid #E3DFF7;border-left:3px solid var(--stamp);border-radius:10px;padding:12px 14px;font-size:12.5px;box-shadow:0 2px 12px rgba(61,36,112,.06);}
.revision-track{font-family:var(--mono);font-size:11px;color:var(--stamp-dark);}
.timer-note{font-size:11px;font-style:italic;color:var(--text-muted-light);}

/* stamp seal animation */
.seal{position:relative;display:inline-flex;align-items:center;gap:8px;}
.seal-mark{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--stamp);color:var(--stamp);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:700;transform:rotate(-12deg);animation:stampdown .35s ease-out;flex-shrink:0;box-shadow:0 0 0 3px rgba(255,61,129,.15),0 2px 10px rgba(255,61,129,.35);}
@keyframes stampdown{0%{transform:rotate(-12deg) scale(2.4);opacity:0;}60%{opacity:1;}100%{transform:rotate(-12deg) scale(1);opacity:1;}}

/* ---------- ledger ---------- */
.ledger{max-width:760px;margin:0 auto;border-left:2px solid #E3DFF7;padding-left:20px;display:flex;flex-direction:column;gap:0;}
.ledger-entry{position:relative;padding:0 0 22px 14px;}
.ledger-entry::before{content:'';position:absolute;left:-27px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--stamp);border:2px solid var(--parchment-2);}
.ledger-ts{font-family:var(--mono);font-size:10.5px;color:var(--text-muted-light);}
.ledger-text{font-size:13px;margin-top:2px;}
.ledger-actor{font-weight:700;}

/* ---------- modal ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(24,11,51,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--parchment-2);border-radius:16px;padding:26px;width:100%;max-width:440px;color:var(--text-ink);box-shadow:0 24px 64px rgba(0,0,0,.35);}
.modal h3{font-family:var(--serif);margin:0 0 4px;font-size:20px;}
.modal p{font-size:12.5px;color:var(--text-muted-light);margin:0 0 16px;}
.modal .field{margin-bottom:12px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

.admin-ruling{display:flex;gap:8px;flex-wrap:wrap;}

@media(max-width:820px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%);transition:.2s;}
  .sidebar.open{transform:translateX(0);}
  .agreement-fields{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="config.js"></script>
<script>
/* ============================= SUPABASE CONFIG =============================
   Credentials live in config.js (next to this file), not here — so updating
   stamped-cloud.html later never requires re-entering your Supabase details.
   See config.js for setup steps.

   Note: this talks to Supabase's REST + Auth APIs directly via fetch() rather
   than the @supabase/supabase-js SDK, so no external SDK import is required.
============================================================================= */
const cfg = window.STAMPED_CONFIG || {};
const SUPABASE_URL = cfg.SUPABASE_URL || '';
const SUPABASE_ANON_KEY = cfg.SUPABASE_ANON_KEY || '';

const supabaseConfigured = SUPABASE_URL.startsWith('https://') && !SUPABASE_URL.includes('YOUR_SUPABASE_URL')
  && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY');

let supabaseError = null;

/* ---------- session (custom DB auth, only used when supabaseConfigured) ---------- */
const SESSION_KEY = 'stamped_session_v2';
let session = null; // { token, userId, userCode }

function loadSessionFromStorage(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    session = raw ? JSON.parse(raw) : null;
  }catch(e){ session = null; }
}
function saveSessionToStorage(){
  try{
    if(session) localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    else localStorage.removeItem(SESSION_KEY);
  }catch(e){ /* storage unavailable — session just won't survive a refresh */ }
}

// apikey/Authorization stay the anon key always now — there's no per-user
// Supabase Auth JWT. Identity instead travels as a custom header that the
// database's RLS policies read via current_setting('request.headers', ...).
function sbHeaders(extra={}){
  const headers = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json', ...extra };
  if(session?.token) headers['X-Session-Token'] = session.token;
  return headers;
}
async function sbSelect(table, query=''){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, { headers: sbHeaders() });
  if(!res.ok) throw new Error(`${table} select failed (${res.status}): ${await res.text()}`);
  return res.json();
}
async function sbInsert(table, row){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST', headers: sbHeaders({Prefer:'return=minimal'}), body: JSON.stringify(row)
  });
  if(!res.ok) throw new Error(`${table} insert failed (${res.status}): ${await res.text()}`);
}
async function sbUpdate(table, id, patch){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method:'PATCH', headers: sbHeaders({Prefer:'return=minimal'}), body: JSON.stringify(patch)
  });
  if(!res.ok) throw new Error(`${table} update failed (${res.status}): ${await res.text()}`);
}
async function sbDelete(table, id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method:'DELETE', headers: sbHeaders({Prefer:'return=minimal'})
  });
  if(!res.ok) throw new Error(`${table} delete failed (${res.status}): ${await res.text()}`);
}
async function sbRpc(fn, args){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST', headers: sbHeaders(), body: JSON.stringify(args)
  });
  if(!res.ok){
    const raw = await res.text();
    let message = raw;
    try{ message = JSON.parse(raw).message || raw; }catch(e){ /* not JSON, use raw text */ }
    throw new Error(message);
  }
  return res.status===204 ? null : res.json();
}

async function apiRegister(firstName, lastName, password, role, initials, color, zone, region, grade, phone, notifyWhatsapp, subcategories){

// Fire-and-forget wrapper used at every mutation site: updates the UI optimistically
// (already done by the caller before this runs), then persists in the background.
// Any failure surfaces as a visible banner instead of failing silently.
function persist(fn){
  Promise.resolve().then(fn).then(()=>{
    if(supabaseError){ supabaseError = null; render(); }
  }).catch(e=>{
    console.error('Supabase write failed:', e);
    supabaseError = e.message || String(e);
    render();
  });
}

const AVATAR_COLORS = ['#FF2E88','#4F46E5','#00C896','#D97706','#9333EA','#00D4FF','#BE185D','#00C896'];
function colorForName(name){
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = (hash*31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}
function initialsForName(name){
  const parts = name.trim().split(/\s+/);
  return ((parts[0]?.[0]||'') + (parts[1]?.[0]||'')).toUpperCase() || '??';

async function loadState(){
  if(!supabaseConfigured){
    // No Supabase credentials configured yet — run the old local-only demo
    // (account switcher, no real login) so the app is still browsable.
    state = defaultState();
    return;
  }
  if(!session){
    // Not logged in yet — nothing to load. The auth screen takes over in render().
    state = { users:{}, projects:[], requests:{} };
    return;
  }
  try{
    // Lazy housekeeping: there's no real background scheduler wired up, so
    // this is the trigger point for the 6-hour response SLA — any project
    // that's timed out gets marked expired and auto-advanced to the next
    // match here, before we read the (possibly just-updated) project list.
    await apiProcessExpiredQuotations();

    const [userRows, projectRows, messageRows, milestoneRows, ledgerRows, requestRows, matchRows] = await Promise.all([
      sbSelect('users', 'select=*'),
      sbSelect('projects', 'select=*&order=created_at.asc'),
      sbSelect('messages', 'select=*&order=created_at.asc'),
      sbSelect('milestones', 'select=*&order=created_at.asc'),
      sbSelect('ledger_entries', 'select=*&order=created_at.asc'),
      sbSelect('project_requests', 'select=*&order=created_at.asc'),
      sbSelect('project_request_matches', 'select=*&order=rank.asc')
    ]);
    supabaseError = null;

    const users = {};
    userRows.forEach(r => { users[r.id] = userRowToJs(r); });

    const projects = projectRows.map(projectRowToJs);
    const byId = {};
    projects.forEach(p => { byId[p.id] = p; });

    messageRows.forEach(r => { const p = byId[r.project_id]; if(p) p.messages.push(messageRowToJs(r)); });
    milestoneRows.forEach(r => { const p = byId[r.project_id]; if(p) p.milestones.push(milestoneRowToJs(r)); });
    ledgerRows.forEach(r => { const p = byId[r.project_id]; if(p) p.ledger.push(ledgerRowToJs(r)); });

    const requests = {};
    requestRows.forEach(r => { requests[r.id] = requestRowToJs(r); });
    matchRows.forEach(r => {
      const req = requests[r.request_id];
      if(req) req.matches.push(matchRowToJs(r));
    });
    // Link each unlocked thread (a project with request_id set) back onto its request.
    projects.forEach(p => {
      if(p.requestId && requests[p.requestId]) requests[p.requestId].projectIds.push(p.id);
    });

    // Projects/messages/milestones/ledger/requests/matches arriving here are
    // already scoped by Supabase RLS to what this signed-in user (or admin)
    // is allowed to see — this is real database-enforced visibility, not
    // just a UI filter.
    state = { users, projects, requests };
    return;
  }catch(e){
    console.error('Supabase load failed:', e);
    supabaseError = e.message || String(e);
  }
  state = { users:{}, projects:[], requests:{} };
}

  const d = new Date(ts);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ' · ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function log(project, text){
  const entry = { id: uid('ledger'), ts:Date.now(), text };
  project.ledger.push(entry);
  if(supabaseConfigured) persist(()=> sbInsert('ledger_entries', ledgerJsToRow(project.id, entry)));
}

function otherRole(role){ return role==='professional' ? 'client' : 'professional'; }
function roleOf(userId, project){ return userId===project.professional ? 'professional' : 'client'; }
function userIdForRole(role, project){ return role==='professional' ? project.professional : project.client; }

/* ============================= AGREEMENT DETECTION ============================= */
function detectAgreement(text){
  const amountMatch = text.match(/₹\s?([\d,]{2,})/) || text.match(/(?:rs\.?|inr)\s?([\d,]{2,})/i);
  const hasDeadline = /deadline|by (mon|tue|wed|thu|fri|sat|sun)|in \d+\s?days?|within \d+\s?days?|next week/i.test(text);
  const hasDeliverable = /deliverable|milestone|logo|design|draft|mockup|wireframe|article|homepage|website|pages?|identity|brand/i.test(text);
  if(amountMatch && (hasDeadline || hasDeliverable)){
    const deadlineDaysMatch = text.match(/(\d+)\s?days?/);
    return {
      name: 'Milestone 1',
      description: text.length > 90 ? text.slice(0,90)+'…' : text,
      amount: amountMatch[1].replace(/,/g,''),
      deadline: deadlineDaysMatch ? deadlineDaysMatch[1] + ' days' : '7 days',
      reviewWindow: '48 hours'
    };
  }
  return null;
}

/* ============================= REPUTATION ============================= */
function badgesFor(profile, role){
  const badges = [];
  const clean = profile.completedClean || 0;
  const lost = profile.disputesLost || 0;
  if(clean >= 1 && clean < 3) badges.push('Rising Talent');
  if(clean >= 3 && lost === 0) badges.push('Reliable');
  if(clean >= 6 && lost === 0) badges.push('Trusted');
  if(profile.mediator) badges.push('Verified Mediator');
  return badges;
}
function bumpScore(userId, role, delta){
  const u = state.users[userId];
  const key = role==='professional' ? 'scoreProfessional' : 'scoreClient';
  u[key] = Math.max(0, Math.min(100, (u[key]||50) + delta));
}
// Local (optimistic) mirror of what bump_reputation() does server-side for
// the new matching-formula inputs — keeps the UI in sync immediately instead
// of waiting on the next full reload.
function bumpStats(userId, turnoverDelta=0, resubmissionsInc=0, disputesCountInc=0){
  const u = state.users[userId];
  if(!u) return;
  u.turnover = (u.turnover||0) + turnoverDelta;
  u.resubmissionsCount = (u.resubmissionsCount||0) + resubmissionsInc;
  u.disputesCount = (u.disputesCount||0) + disputesCountInc;
}
function persistUser(userId){
  if(supabaseConfigured) persist(()=> sbUpdate('users', userId, userJsToRow(userId, state.users[userId])));
}
// Reputation changes often affect the OTHER party in a project (e.g. a client's
// action bumps the consultant's score), which RLS's "update your own row only"
// policy on `users` won't allow directly. bump_reputation is a SECURITY DEFINER
// RPC that permits this specifically between real project counterparts (or admins).
// The three trailing params feed the consultant-matching formula in
// start_project(): turnover (₹ released), resubmissions, and disputes entered.
function persistReputation(userId, role, scoreDelta, completedInc=0, disputesInc=0, turnoverDelta=0, resubmissionsInc=0, disputesCountInc=0){
  if(supabaseConfigured) persist(()=> sbRpc('bump_reputation', {
    p_user_id: userId, p_role: role, p_score_delta: scoreDelta,
    p_completed_inc: completedInc, p_disputes_inc: disputesInc,
    p_turnover_delta: turnoverDelta, p_resubmissions_inc: resubmissionsInc, p_disputes_count_inc: disputesCountInc
  }));
}
function persistMilestone(project, ms){
  if(supabaseConfigured) persist(()=> sbUpdate('milestones', ms.id, milestoneJsToRow(project.id, ms)));
}
function persistProjectDispute(project){
  if(supabaseConfigured) persist(()=> sbUpdate('projects', project.id, { dispute_stage: project.disputeStage }));
}

/* ---------- Registration Step 1: role + location ---------- */
function renderRegisterStep1(){
  const f = el('<div></div>');
  const roleSelect = el(`<select id="reg-role" style="${selectStyle()}">
      <option value="client" ${regData.role==='client'?'selected':''}>Client — hiring a consultant</option>
      <option value="professional" ${regData.role==='professional'?'selected':''}>Consultant — offering services</option>
      <option value="admin" ${regData.role==='admin'?'selected':''}>Admin — platform oversight</option>
    </select>`);
  const roleField = el(`<div class="field" style="margin-bottom:12px;"><label>I am registering as</label></div>`);
  roleField.appendChild(roleSelect);
  f.appendChild(roleField);

  // Client/Consultant: a single city dropdown (Tier 1 / Tier 2). Admin: grade,
  // then the city (Grade 1) or a region-only dropdown (Grade 2) that grade scopes to.
  const locationWrap = el('<div></div>');
  f.appendChild(locationWrap);

  function cityOptions(selected){
    let html = `<option value="">Select a city…</option><optgroup label="Tier 1 Cities">`;
    Object.keys(TIER1_CITIES).forEach(c=>{ html += `<option value="${c}" ${selected===c?'selected':''}>${c}</option>`; });
    html += `</optgroup><optgroup label="Tier 2 Cities">`;
    Object.keys(TIER2_CITIES).forEach(c=>{ html += `<option value="${c}" ${selected===c?'selected':''}>${c}</option>`; });
    html += `</optgroup>`;
    return html;
  }
  function regionOptions(selected){
    const regions = [...new Set([...Object.values(TIER1_CITIES), ...Object.values(TIER2_CITIES)])];
    return `<option value="">Select a region…</option>` + regions.map(r=>`<option value="${r}" ${selected===r?'selected':''}>${r}</option>`).join('');
  }

  function syncLocation(){
    locationWrap.innerHTML = '';
    const role = roleSelect.value;
    if(role==='admin'){
      const gradeSelect = el(`<select id="reg-grade" style="${selectStyle()}">
        <option value="1" ${regData.grade===1?'selected':''}>Grade 1 — Zonal support</option>
        <option value="2" ${regData.grade===2?'selected':''}>Grade 2 — Regional escalation</option>
        <option value="3" ${regData.grade===3?'selected':''}>Grade 3 — Country head (full access)</option>
      </select>`);
      const gradeField = el(`<div class="field" style="margin-bottom:12px;"><label>Admin grade</label></div>`);
      gradeField.appendChild(gradeSelect);
      locationWrap.appendChild(gradeField);

      const cityField = el(`<div class="field" style="margin-bottom:12px;"><label>Location (city)</label></div>`);
      const citySelect = el(`<select id="reg-city">${cityOptions(regData.city)}</select>`);
      citySelect.style.cssText = selectStyle();
      cityField.appendChild(citySelect);

      const regionField = el(`<div class="field" style="margin-bottom:12px;"><label>Region</label></div>`);
      const regionSelect = el(`<select id="reg-region-only">${regionOptions(regData.region)}</select>`);
      regionSelect.style.cssText = selectStyle();
      regionField.appendChild(regionSelect);

      function syncGradeFields(){
        const grade = Number(gradeSelect.value);
        cityField.style.display = grade===1 ? '' : 'none';
        regionField.style.display = grade===2 ? '' : 'none';
      }
      gradeSelect.onchange = syncGradeFields;
      locationWrap.appendChild(cityField);
      locationWrap.appendChild(regionField);
      syncGradeFields();
    } else {
      const cityField = el(`<div class="field" style="margin-bottom:12px;"><label>Location (city)</label></div>`);
      const citySelect = el(`<select id="reg-city">${cityOptions(regData.city)}</select>`);
      citySelect.style.cssText = selectStyle();
      cityField.appendChild(citySelect);
      locationWrap.appendChild(cityField);
    }
  }
  roleSelect.onchange = syncLocation;
  syncLocation();

  const errBox = el(`<div style="display:none;background:#FFE1EA;color:#DC2626;border-radius:4px;padding:9px 12px;font-size:12.5px;margin-bottom:10px;"></div>`);
  f.insertBefore(errBox, roleField);

  const btn = el('<button class="btn btn-stamp" style="width:100%;padding:11px;margin-top:6px;">Next</button>');
  btn.onclick = ()=>{
    const role = roleSelect.value;
    const showErr = (msg)=>{ errBox.textContent = msg; errBox.style.display='block'; };
    let city='', zone='', region='', grade=null;
    if(role==='admin'){
      grade = Number(document.getElementById('reg-grade').value);
      if(grade===1){
        city = document.getElementById('reg-city').value;
        if(!city){ showErr('Select a zone (city) for a Grade 1 admin.'); return; }
        zone = city; region = regionForCity(city);
      } else if(grade===2){
        region = document.getElementById('reg-region-only').value;
        if(!region){ showErr('Select a region for a Grade 2 admin.'); return; }
      }
      // Grade 3 needs neither
    } else {
      city = document.getElementById('reg-city').value;
      if(!city){ showErr('Select your city.'); return; }
      zone = city; region = regionForCity(city);
    }
    regData.role = role; regData.city = city; regData.zone = zone; regData.region = region; regData.grade = grade;
    regStep = 2;
    render();
  };
  f.appendChild(btn);
  return f;
}

async function submitRegistration(showErr){
  authBusy = true; authError = null; render();
  try{
    const name = `${regData.firstName} ${regData.lastName}`;
    const result = await apiRegister(
      regData.firstName, regData.lastName, regData.password, regData.role,
      initialsForName(name), colorForName(name),
      regData.zone||null, regData.region||null, regData.grade||null,
      regData.phone||null, regData.notifyWhatsapp, regData.subcategories
    );
    session = { token: result.token, userId: result.user_id, userCode: result.user_code };
    saveSessionToStorage();
    viewingAs = session.userId;
    currentProjectId = null;
    await loadState();
    modal = { type:'show-user-id', code: result.user_code };
    resetRegistration();
    authBusy = false; render();
  }catch(e){
    authBusy = false;
    if(showErr) showErr(e.message || 'Registration failed.');
    else { authError = e.message || 'Registration failed.'; render(); }
  }
}

    registerBtn.onclick = ()=>{ modal = { type:'register', name:'', role:'client' }; render(); };
    right.appendChild(registerBtn);
  }

  return bar;
}

function renderSidebar(){

    <div class="rep-card-name">${user.name}</div>

  if(user.role==='client'){
    const myRequests = Object.values(state.requests||{}).filter(r => r.client===viewingAs);

      list.appendChild(el(`<div class="timer-note" style="padding:6px 6px 2px">No projects yet — start one below.</div>`));

      const unlockedCount = r.projectIds.length;

        <div class="project-item-title">${escapeHtml(r.title)}</div>
        <div class="project-item-meta">${unlockedCount}/${r.matches.length} consultant${r.matches.length!==1?'s':''} unlocked · ${r.subcategory}</div>
      </div>`);
      item.onclick = ()=>{ currentRequestId = r.id; currentProjectId=null; render(); };
      list.appendChild(item);
    });
    ungrouped.forEach(p=>{
      const other = getUser(p.professional);
      const item = el(`<div class="project-item ${p.id===currentProjectId?'active':''}">
        <div class="project-item-title">${p.title}</div>
        <div class="project-item-meta">with ${other.name} · ${p.milestones.length} milestone${p.milestones.length!==1?'s':''}</div>
      </div>`);
      item.onclick = ()=>{ currentProjectId = p.id; currentRequestId=null; currentTab='chat'; expandedMilestone=null; render(); };
      list.appendChild(item);
    });
  } else {
    const pending = myProjects.filter(p => p.responseStatus==='pending');
    const settled = myProjects.filter(p => p.responseStatus!=='pending');
    if(myProjects.length===0){
      list.appendChild(el(`<div class="timer-note" style="padding:6px 6px 2px">No projects yet — you\u2019ll appear here once a Client unlocks a quotation with you.</div>`));
    }
    if(pending.length>0){
      const banner = el(`<div class="project-item ${showIncomingRequests?'active':''}" style="border-color:var(--stamp);">
        <div class="project-item-title" style="color:var(--stamp);">⏱ ${pending.length} Incoming Request${pending.length!==1?'s':''}</div>
        <div class="project-item-meta">Respond within 6 hours or it moves to the next consultant</div>
      </div>`);
      banner.onclick = ()=>{ showIncomingRequests = true; currentProjectId=null; currentRequestId=null; render(); };
      list.appendChild(banner);
    }
    settled.forEach(p=>{
      const other = getUser(p.client);
      const statusNote = p.responseStatus==='rejected' ? ' · Declined' : p.responseStatus==='expired' ? ' · Expired' : '';
      const item = el(`<div class="project-item ${p.id===currentProjectId && !showIncomingRequests?'active':''}">
        <div class="project-item-title">${p.title}</div>
        <div class="project-item-meta">with ${other.name} · ${p.milestones.length} milestone${p.milestones.length!==1?'s':''}${statusNote}</div>
      </div>`);
      item.onclick = ()=>{ currentProjectId = p.id; currentRequestId=null; showIncomingRequests=false; currentTab='chat'; expandedMilestone=null; render(); };
      list.appendChild(item);
    });
  }
  sb.appendChild(list);

  if(getUser(viewingAs).role==='client'){
    const newBtn = el('<button class="new-project-btn">+ Start new project</button>');
    newBtn.onclick = ()=>{
      modal = supabaseConfigured
        ? { type:'start-project', step:1, title:'', subcategory:'', description:'' }
        : { type:'new-project', title:'', otherId:'', tier:'free' };
      render();
    };
    sb.appendChild(newBtn);
  } else if(!supabaseConfigured){
    // Local-only demo mode has no real matching engine, so it keeps the old
    // direct-connect flow available to either role for easy click-through testing.
    const newBtn = el('<button class="new-project-btn">+ Start new project</button>');
    newBtn.onclick = ()=>{ modal = { type:'new-project', title:'', otherId:'', tier:'free' }; render(); };
    sb.appendChild(newBtn);
  }

  return sb;
}

function renderMain(){
  const main = el('<div class="main"></div>');
  const admin = isAdmin(viewingAs);

  if(admin && (adminView==='dashboard' || !currentProjectId)){
    main.appendChild(renderAdminDashboard());
    return main;
  }

  const isClient = !admin && getUser(viewingAs).role==='client';
  if(isClient && !currentProjectId){
    const myRequests = Object.values(state.requests||{}).filter(r=>r.client===viewingAs);
    if(!currentRequestId && myRequests.length>0) currentRequestId = myRequests[myRequests.length-1].id;
    if(currentRequestId && state.requests[currentRequestId]){
      main.appendChild(renderRequestView(state.requests[currentRequestId]));
      return main;
    }
  }

  const isProfessional = !admin && getUser(viewingAs).role==='professional';
  if(isProfessional && showIncomingRequests){
    main.appendChild(renderIncomingRequestsView());
    return main;
  }

  const visibleProjects = admin ? state.projects : state.projects.filter(p=>p.professional===viewingAs||p.client===viewingAs);
  const project = visibleProjects.find(p=>p.id===currentProjectId) || visibleProjects[0];
  if(project) currentProjectId = project.id;

  if(!project){
    main.appendChild(el(admin
      ? `<div class="empty-state"><h3>No projects on the platform yet</h3><p>Once clients and consultants start connecting, every project will be visible here.</p></div>`
      : `<div class="empty-state"><h3>No projects yet</h3><p>Start a new project from the sidebar to connect with a client or consultant.</p></div>`));
    return main;
  }

  if(admin){
    const back = el('<div class="back-link">&larr; Back to Dashboard</div>');
    back.onclick = ()=>{ adminView='dashboard'; render(); };
    main.appendChild(back);
  } else if(project.requestId && state.requests[project.requestId]){
    const back = el('<div class="back-link">&larr; Back to compare quotations</div>');
    back.onclick = ()=>{ currentRequestId = project.requestId; currentProjectId = null; render(); };
    main.appendChild(back);
  }

  const myRole = admin ? 'admin' : roleOf(viewingAs, project);
  const proUser = getUser(project.professional), cliUser = getUser(project.client);
  const partiesLine = admin
    ? `${proUser.name} (Consultant) ↔ ${cliUser.name} (Client)`
    : `with ${getUser(myRole==='professional'?project.client:project.professional).name}`;

  main.appendChild(el(`<div class="main-header">
    <div>
      <div class="main-title">${project.title}</div>
      <div class="main-sub">${partiesLine} · ${project.tier} tier (${project.tier==='pro'?'2%':'5%'} commission) · Project ID ${project.id}</div>
    </div>
  </div>`));

  const tabs = el('<div class="tabs"></div>');
  [['description','Project Description'],['chat','Chat'],['milestones',`Milestones`],['ledger','Ledger']].forEach(([key,label])=>{
    const count = key==='milestones' ? project.milestones.length : (key==='ledger'?project.ledger.length:null);
    const t = el(`<div class="tab ${currentTab===key?'active':''}">${label}${count!==null?`<span class="tab-count">${count}</span>`:''}</div>`);
    t.onclick = ()=>{ currentTab = key; render(); };
    tabs.appendChild(t);
  });
  main.appendChild(tabs);

  const panel = el('<div class="panel"></div>');
  if(currentTab==='description') panel.appendChild(renderProjectDescription(project, myRole));
  if(currentTab==='chat') panel.appendChild(renderChat(project, myRole));
  if(currentTab==='milestones') panel.appendChild(renderMilestones(project, myRole));
  if(currentTab==='ledger') panel.appendChild(renderLedger(project));
  main.appendChild(panel);

  return main;
}

/* ---------- project description tab ---------- */
function renderProjectDescription(project, myRole){
  const wrap = el('<div style="max-width:720px;margin:0 auto;"></div>');
  const req = project.requestId ? state.requests[project.requestId] : null;

  const category = req ? req.category : project.category;
  const subcategory = req ? req.subcategory : project.subcategory;
  const description = req ? req.description : project.description;

  if(!category && !subcategory && !description){
    wrap.appendChild(el(`<div class="empty-state" style="padding:40px 20px"><h3>No description on file</h3><p>This project was created before the category/description fields existed, or none was entered.</p></div>`));
    return wrap;
  }
  wrap.appendChild(el(`<div class="ms-meta-row" style="margin-bottom:16px">
    <span>Category: <b>${escapeHtml(category||'—')}</b></span>
    <span>Sub-category: <b>${escapeHtml(subcategory||'—')}</b></span>
  </div>`));

  if(req && myRole==='client'){
    // The Client owns this — one shared editable description, kept in sync
    // across every consultant thread under the same request. Reuses the
    // same editor component the compare-quotes view uses, so the word
    // limit and document upload behave identically from either place.
    wrap.appendChild(el(`<div class="timer-note" style="margin-bottom:8px">Shared with every consultant you're comparing on this request — one edit updates it everywhere.</div>`));
    wrap.appendChild(renderSharedDescriptionEditor(req));
  } else if(req){
    wrap.appendChild(el(`<div class="timer-note" style="margin-bottom:8px">Shared brief from the client — the same description every consultant they're comparing sees.</div>`));
    wrap.appendChild(el(`<div class="note-box" style="white-space:pre-wrap;line-height:1.6;">${escapeHtml(description || 'No description was provided.')}</div>`));
    if(req.documentName){
      const dlBtn = el(`<button class="btn btn-ghost" style="margin-top:10px;">📎 Download ${escapeHtml(req.documentName)}</button>`);
      dlBtn.onclick = ()=> downloadDataUrl(req.documentName, req.documentType||'application/octet-stream', req.documentData);
      wrap.appendChild(dlBtn);
    }
  } else {
    wrap.appendChild(el(`<div class="note-box" style="white-space:pre-wrap;line-height:1.6;">${escapeHtml(description || 'No description was provided.')}</div>`));
  }
  return wrap;
}

/* ---------- compare-quotes view (Clients) ---------- */
function renderRequestView(request){
  const wrap = el('<div class="panel"></div>');
  wrap.appendChild(el(`<div class="main-title" style="margin-bottom:4px">${escapeHtml(request.title)}</div>`));
  wrap.appendChild(el(`<div class="main-sub" style="margin-bottom:18px">${escapeHtml(request.category)} · ${escapeHtml(request.subcategory)} · Comparing ${request.matches.length} consultant${request.matches.length!==1?'s':''}</div>`));

  wrap.appendChild(renderSharedDescriptionEditor(request));

  const sortedMatches = [...request.matches].sort((a,b)=>a.rank-b.rank);
  const findProj = (m)=> state.projects.find(p=>p.requestId===request.id && p.professional===m.professionalId);

  // Which match is "active" (shown large, in the center): keep whatever the
  // client last picked if it's still a valid match; otherwise default to
  // the most recently unlocked thread, or the top match if none unlocked yet.
  if(!request.activeMatchId || !sortedMatches.some(m=>m.professionalId===request.activeMatchId)){
    const unlockedInOrder = sortedMatches.filter(m=>findProj(m));
    request.activeMatchId = unlockedInOrder.length ? unlockedInOrder[unlockedInOrder.length-1].professionalId : (sortedMatches[0]?.professionalId || null);
  }

  const layout = el('<div style="display:flex;gap:20px;align-items:flex-start;margin-top:20px;flex-wrap:wrap;"></div>');
  const centerCol = el('<div style="flex:2 1 380px;min-width:320px;"></div>');
  const rightCol = el('<div style="flex:1 1 220px;min-width:220px;display:flex;flex-direction:column;gap:10px;"></div>');

  const activeMatch = sortedMatches.find(m=>m.professionalId===request.activeMatchId);
  if(activeMatch){
    centerCol.appendChild(renderMatchCard(request, activeMatch, findProj(activeMatch)));
  }

  const others = sortedMatches.filter(m=>m.professionalId!==request.activeMatchId);
  if(others.length>0){
    rightCol.appendChild(el(`<div class="sidebar-section-label">Other matches</div>`));
    others.forEach(m=>{
      rightCol.appendChild(renderCompactMatchCard(request, m, findProj(m)));
    });
  }

  layout.appendChild(centerCol);
  if(others.length>0) layout.appendChild(rightCol);
  wrap.appendChild(layout);
  return wrap;
}

function renderCompactMatchCard(request, match, proj){
  const pro = getUser(match.professionalId);
  const statusText = !proj ? 'Not unlocked yet'
    : proj.responseStatus==='pending' ? `Awaiting response · ${timeLeftLabel(proj.responseDeadline)}`
    : proj.responseStatus==='rejected' ? 'Declined'
    : proj.responseStatus==='expired' ? 'Expired'
    : 'Active';
  const lastMsg = proj && proj.messages.length ? proj.messages[proj.messages.length-1] : null;
  const card = el(`<div class="project-item" style="cursor:pointer;">
    <div class="project-item-title" style="color:var(--text-ink);">${escapeHtml(pro.name)} <span style="font-weight:400;color:var(--text-muted-light);font-size:11px;">· ${match.score}/100</span></div>
    <div class="project-item-meta">${statusText}${lastMsg ? ' · "'+escapeHtml(lastMsg.text.slice(0,40))+(lastMsg.text.length>40?'…':'')+'"' : ''}</div>
  </div>`);
  card.onclick = ()=>{ request.activeMatchId = match.professionalId; render(); };
  return card;
}

function countWords(text){
  return (text||'').trim().split(/\s+/).filter(Boolean).length;
}
const MAX_DESCRIPTION_WORDS = 500;
const MAX_DOCUMENT_BYTES = 2 * 1024 * 1024; // 2MB — stored as base64 in the DB, no external file storage configured
const ALLOWED_DOCUMENT_TYPES = ['.txt','.doc','.ppt','.pdf'];

function downloadDataUrl(filename, mimeType, base64Data){
  const a = document.createElement('a');
  a.href = `data:${mimeType};base64,${base64Data}`;
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function renderSharedDescriptionEditor(request){
  const box = el('<div class="note-box"></div>');
  box.appendChild(el(`<div style="font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted-light);font-weight:600;margin-bottom:6px;">Project Description — shared with every consultant below</div>`));
  const textarea = el(`<textarea rows="4" style="border:1px solid #E3DFF7;border-radius:4px;padding:9px 11px;font-family:var(--sans);font-size:13.5px;background:white;width:100%;line-height:1.5;">${escapeHtml(request.description||'')}</textarea>`);
  box.appendChild(textarea);

  const wordCountNote = el(`<div class="timer-note" style="margin-top:4px;"></div>`);
  function syncWordCount(){
    const n = countWords(textarea.value);
    wordCountNote.textContent = `${n} / ${MAX_DESCRIPTION_WORDS} words`;
    wordCountNote.style.color = n > MAX_DESCRIPTION_WORDS ? 'var(--stamp)' : '';
  }
  textarea.oninput = syncWordCount;
  syncWordCount();
  box.appendChild(wordCountNote);

  const errBox = el(`<div style="display:none;background:#FFE1EA;color:#DC2626;border-radius:4px;padding:8px 10px;font-size:12px;margin-top:8px;"></div>`);
  box.appendChild(errBox);

  // Uploaded reference document
  const docRow = el('<div style="margin-top:10px;"></div>');
  function renderDocRow(){
    docRow.innerHTML = '';
    if(request.documentName){
      const line = el(`<div style="display:flex;align-items:center;gap:10px;font-size:12.5px;">
        <span>📎 <b>${escapeHtml(request.documentName)}</b></span>
      </div>`);
      const dlBtn = el('<button class="btn btn-ghost" style="padding:5px 10px;font-size:11.5px;">Download</button>');
      dlBtn.onclick = ()=> downloadDataUrl(request.documentName, request.documentType||'application/octet-stream', request.documentData);
      const rmBtn = el('<button class="btn btn-ghost" style="padding:5px 10px;font-size:11.5px;">Remove</button>');
      rmBtn.onclick = ()=>{
        request.documentName = null; request.documentType = null; request.documentData = null;
        if(supabaseConfigured) persist(()=> sbUpdate('project_requests', request.id, { document_name:null, document_type:null, document_data:null }));
        renderDocRow();
      };
      line.appendChild(dlBtn); line.appendChild(rmBtn);
      docRow.appendChild(line);
    } else {
      const uploadBtn = el('<button class="btn btn-ghost">Upload Document</button>');
      const fileInput = el(`<input type="file" accept=".txt,.doc,.ppt,.pdf" style="display:none;"/>`);
      uploadBtn.onclick = ()=> fileInput.click();
      fileInput.onchange = ()=>{
        const file = fileInput.files[0];
        if(!file) return;
        const ext = '.' + file.name.split('.').pop().toLowerCase();
        if(!ALLOWED_DOCUMENT_TYPES.includes(ext)){
          errBox.textContent = `Only ${ALLOWED_DOCUMENT_TYPES.join(', ')} files are accepted.`;
          errBox.style.display = 'block';
          return;
        }
        if(file.size > MAX_DOCUMENT_BYTES){
          errBox.textContent = 'File is too large — 2MB maximum.';
          errBox.style.display = 'block';
          return;
        }
        errBox.style.display = 'none';
        const reader = new FileReader();
        reader.onload = ()=>{
          const base64 = reader.result.split(',')[1];
          request.documentName = file.name;
          request.documentType = file.type || 'application/octet-stream';
          request.documentData = base64;
          if(supabaseConfigured) persist(()=> sbUpdate('project_requests', request.id, {
            document_name: file.name, document_type: request.documentType, document_data: base64
          }));
          renderDocRow();
        };
        reader.readAsDataURL(file);
      };
      docRow.appendChild(uploadBtn); docRow.appendChild(fileInput);
      docRow.appendChild(el(`<div class="timer-note" style="margin-top:4px;">Accepted: .txt, .doc, .ppt, .pdf — 2MB max</div>`));
    }
  }
  renderDocRow();
  box.appendChild(docRow);

  const row = el('<div style="margin-top:10px;display:flex;align-items:center;gap:10px;"></div>');
  const saveBtn = el('<button class="btn btn-stamp">Update Description</button>');
  const savedNote = el('<span class="timer-note" style="display:none;">Saved — every consultant now sees this.</span>');
  saveBtn.onclick = ()=>{
    const newDesc = textarea.value.trim();
    if(countWords(newDesc) > MAX_DESCRIPTION_WORDS){
      errBox.textContent = `Description is over the ${MAX_DESCRIPTION_WORDS}-word limit — trim it before saving.`;
      errBox.style.display = 'block';
      return;
    }
    errBox.style.display = 'none';
    request.description = newDesc;
    if(supabaseConfigured) persist(()=> sbUpdate('project_requests', request.id, { description: newDesc }));
    savedNote.style.display = '';
    setTimeout(()=>{ savedNote.style.display='none'; }, 2000);
  };
  row.appendChild(saveBtn); row.appendChild(savedNote);
  box.appendChild(row);
  return box;
}

function renderMatchCard(request, match, proj){
  const pro = getUser(match.professionalId);
  const card = el('<div style="border:1px solid #E3DFF7;border-radius:8px;background:white;overflow:hidden;"></div>');
  const statusPill = !proj ? '' : proj.responseStatus==='pending' ? `<span class="status-pill s-new">Awaiting response</span>`
    : proj.responseStatus==='rejected' ? `<span class="status-pill s-disputed">Declined</span>`
    : proj.responseStatus==='expired' ? `<span class="status-pill s-disputed">Expired</span>`
    : `<span class="status-pill s-active">Unlocked</span>`;
  const header = el(`<div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:var(--parchment-2);border-bottom:1px solid #E3DFF7;flex-wrap:wrap;gap:6px;">
    <div>
      <div style="font-family:var(--serif);font-weight:600;font-size:16px;">${escapeHtml(pro.name)}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--text-muted-light);">Match score ${match.score}/100 · ${escapeHtml(pro.zone||'—')}</div>
    </div>
    ${statusPill}
  </div>`);
  card.appendChild(header);

  if(proj){

function timeLeftLabel(deadline){
  if(!deadline) return '—';
  const ms = deadline - Date.now();
  if(ms <= 0) return 'Expired';
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return `${h}h ${m}m left`;
}

/* ---------- admin dashboard ---------- */
function computeProjectValue(p){
  return p.milestones.reduce((sum,m)=> sum + (m.amount||0), 0);
}
function deriveProjectStatus(p){
  if(p.milestones.some(m=>m.status==='dispute1'||m.status==='dispute2')) return 'Disputed';
  if(p.milestones.length===0) return 'New';
  if(p.milestones.every(m=>m.status==='released'||m.status==='resolved')) return 'Completed';
  return 'Active';
}
function deriveProjectRisk(p){
  if(p.milestones.some(m=>m.status==='dispute1'||m.status==='dispute2')) return 'High';
  if(p.milestones.some(m=>m.revisionsUsed>=1)) return 'Medium';
  return 'Low';
}
// Percentage of the project's total contract value that's been paid out /
// concluded so far (released milestones, plus resolved disputes — win, loss,
// or split, the dispute process itself is done either way). Null when there's
// no value to measure yet (no milestones locked).
function computeProjectPercent(p){
  const total = computeProjectValue(p);
  if(total <= 0) return null;
  const done = p.milestones
    .filter(m=>m.status==='released'||m.status==='resolved')
    .reduce((sum,m)=> sum + (m.amount||0), 0);
  return Math.round((done/total)*100);
}
const STATUS_PILL_CLASS = { Active:'s-active', New:'s-new', Completed:'s-completed', Disputed:'s-disputed' };
const RISK_CLASS = { Low:'risk-low', Medium:'risk-medium', High:'risk-high' };

/* ---------- lightweight charts (no external library — hand-built SVG/CSS) ---------- */
function describeArc(cx, cy, r, startAngle, endAngle){
  const toXY = (ang)=>{
    const rad = (ang - 90) * Math.PI/180;
    return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)];
  };
  const [x1,y1] = toXY(startAngle);
  const [x2,y2] = toXY(endAngle);
  const largeArc = (endAngle-startAngle) > 180 ? 1 : 0;
  return `M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z`;
}
function renderDonutChart(data, size=132){
  // data: [{label, value, color}]
  const total = data.reduce((s,d)=>s+d.value,0);
  const r = size/2, cx=r, cy=r;
  let angle = 0;
  let paths = '';
  if(total>0){
    data.forEach(d=>{
      if(d.value<=0) return;
      const sweep = d.value/total*360;
      const start = angle, end = angle+sweep;
      angle = end;
      if(sweep>=359.99){
        paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${d.color}"/>`;
      } else {
        paths += `<path d="${describeArc(cx,cy,r,start,end)}" fill="${d.color}"/>`;
      }
    });
  } else {
    paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#ECE7FA"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${r*0.6}" fill="white"/></svg>`;
}
function renderChartLegend(data){
  const wrap = el('<div style="display:flex;flex-direction:column;gap:6px;"></div>');
  const total = data.reduce((s,d)=>s+d.value,0);
  data.forEach(d=>{
    const pct = total>0 ? Math.round(d.value/total*100) : 0;
    wrap.appendChild(el(`<div style="display:flex;align-items:center;gap:8px;font-size:11.5px;">
      <span style="width:10px;height:10px;border-radius:3px;background:${d.color};flex-shrink:0;"></span>
      <span style="color:var(--text-muted-light);flex:1;">${escapeHtml(d.label)}</span>
      <span style="font-family:var(--mono);font-weight:600;color:var(--text-ink);">${d.value} · ${pct}%</span>
    </div>`));
  });
  return wrap;
}
function renderBarChartRows(data){
  // data: [{label, value}], sorted desc by caller if desired
  const max = Math.max(...data.map(d=>d.value), 1);
  const wrap = el('<div></div>');
  data.forEach(d=>{
    const row = el(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;"></div>`);
    row.appendChild(el(`<div style="width:78px;font-size:11px;color:var(--text-muted-light);flex-shrink:0;">${escapeHtml(d.label)}</div>`));
    const track = el(`<div style="flex:1;background:#ECE7FA;border-radius:999px;height:14px;overflow:hidden;"></div>`);
    track.appendChild(el(`<div style="width:${Math.max(2,d.value/max*100)}%;height:100%;background:var(--gradient-cool);border-radius:999px;"></div>`));
    row.appendChild(track);
    row.appendChild(el(`<div style="width:76px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--text-ink);flex-shrink:0;">${fmtMoney(d.value)}</div>`));
    wrap.appendChild(row);
  });
  return wrap;
}

function renderChat(project, myRole){
  const wrap = el('<div></div>');
  const scroll = el('<div class="chat-scroll"></div>');
  project.messages.forEach(m=>{
    const mine = m.sender === viewingAs;
    const bubbleClass = myRole==='admin' ? (m.sender===project.professional?'theirs':'mine') : (mine?'mine':'theirs');
    scroll.appendChild(el(`<div class="msg ${bubbleClass}">${escapeHtml(m.text)}<div class="msg-meta">${getUser(m.sender).name.split(' ')[0]} · ${fmtTs(m.ts)}</div></div>`));
  });
  wrap.appendChild(scroll);

  if(myRole==='admin'){
    wrap.appendChild(el(`<div class="timer-note" style="max-width:720px;margin:14px auto 0;text-align:center">Viewing as Admin — read only. Admins observe conversations but don't take part in them.</div>`));
    return wrap;
  }

  if(pendingSuggestion && pendingSuggestion.projectId===project.id && myRole==='professional'){
    wrap.appendChild(renderSuggestionCard(project, myRole));
  }

  const inputRow = el(`<div class="chat-input-row">
    <input class="chat-input" type="text" placeholder="Message ${getUser(myRole==='professional'?project.client:project.professional).name.split(' ')[0]}…" />
    <button class="send-btn">Send</button>
  </div>`);
  const input = inputRow.querySelector('input');
  const send = ()=>{
    const text = input.value.trim();
    if(!text) return;
    const msg = { id: uid('msg'), sender:viewingAs, text, ts:Date.now() };
    project.messages.push(msg);
    if(supabaseConfigured) persist(()=> sbInsert('messages', messageJsToRow(project.id, msg)));
    const detected = detectAgreement(text);
    if(myRole==='professional' && detected && !pendingSuggestion && !project.milestones.some(m=>m.status==='suggested'||m.status==='locked'||m.status==='in_progress'||m.status==='submitted'||m.status==='revision')){
      const num = project.milestones.length + 1;
      pendingSuggestion = { projectId: project.id, name: 'Milestone '+num, description: detected.description, amount: detected.amount, deadline: detected.deadline, reviewWindow: detected.reviewWindow, agreedBy:{professional:false, client:false} };
      log(project, `Stamped detected milestone details in chat and suggested an agreement card.`);
    }
    input.value='';
    render();
    setTimeout(()=>{ const s=document.querySelector('.chat-scroll'); if(s) s.scrollTop = s.scrollHeight; },0);
  };
  inputRow.querySelector('.send-btn').onclick = send;
  input.onkeydown = (e)=>{ if(e.key==='Enter') send(); };
  wrap.appendChild(inputRow);
  return wrap;
}

    const addBtn = el('<button class="btn btn-stamp">+ Propose new milestone</button>');
    addBtn.onclick = ()=>{
      const n = project.milestones.length + 1;
      const ms = {
        id: uid('ms'), name:'Milestone '+n, description:'', amount:0, deadline:'7 days', reviewWindow:'48 hours',
        status:'proposed', revisionsUsed:0, agreedBy:{professional:true, client:false}, proposedBy:'professional',
        confirmedAt:null, submission:null, paymentHeldAt:null, releasedAt:null, disputeStage:0
      };
      project.milestones.push(ms);
      expandedMilestone = ms.id;
      log(project, `Consultant proposed a new milestone directly.`);
      if(supabaseConfigured) persist(()=> sbInsert('milestones', milestoneJsToRow(project.id, ms)));
      render();
    };
    header.appendChild(addBtn);
    wrap.appendChild(header);
  }

  if(myRole==='client'){
    const proposed = project.milestones.filter(m=>m.status==='proposed');
    if(proposed.length>0) wrap.appendChild(renderQuotationReviewPanel(project, proposed));
  }

  if(project.milestones.length===0){
    wrap.appendChild(el(`<div class="empty-state" style="padding:40px 20px"><h3>No milestones yet</h3><p>${myRole==='admin' ? 'Nothing proposed on this project yet.' : myRole==='professional' ? 'Discuss scope in Chat and Stamped will suggest an agreement, or propose one directly with the button above.' : 'Your consultant will send a quotation with milestones here once they\u2019re ready — you can accept, reject, or comment on it.'}</p></div>`));
    return wrap;
  }
  const list = el('<div class="ms-list"></div>');
  project.milestones.forEach(ms=>{
    list.appendChild(renderMilestoneCard(project, ms, myRole));
  });
  wrap.appendChild(list);

  if(project.quotationApproved && myRole!=='admin'){
    wrap.appendChild(renderLegalAgreementSection(project, myRole));
  }

  return wrap;
}

function generateLegalAgreementText(project){
  const pro = getUser(project.professional), cli = getUser(project.client);
  const approvedMs = project.milestones.filter(m=>['locked','submitted','revision','paid_pending','paid_held','released','resolved'].includes(m.status));
  const total = approvedMs.reduce((s,m)=>s+(m.amount||0),0);
  const lines = [];
  lines.push('STAMPED — PROJECT AGREEMENT');
  lines.push('='.repeat(40));
  lines.push('');
  lines.push(`Project: ${project.title}`);
  lines.push(`Category: ${project.category||'—'} / ${project.subcategory||'—'}`);
  lines.push(`Project ID: ${project.id}`);
  lines.push(`Generated: ${new Date().toLocaleString('en-IN')}`);
  lines.push('');
  lines.push('PARTIES');
  lines.push('-'.repeat(40));
  lines.push(`Consultant: ${pro.name} (${pro.userCode||'—'})`);
  lines.push(`Client: ${cli.name} (${cli.userCode||'—'})`);
  lines.push('');
  lines.push('PROJECT DESCRIPTION');
  lines.push('-'.repeat(40));
  lines.push(project.description || '(no description on file)');
  lines.push('');
  lines.push('APPROVED MILESTONES');
  lines.push('-'.repeat(40));
  approvedMs.forEach((m,i)=>{
    lines.push(`${i+1}. ${m.name} — ${fmtMoney(m.amount)}`);
    lines.push(`   Deliverable: ${m.description||'—'}`);
    lines.push(`   Deadline: ${m.deadline||'—'} · Review window: ${m.reviewWindow||'—'}`);
    lines.push(`   Status: ${(STATUS_LABEL[m.status]||['—'])[0]}`);
    lines.push('');
  });
  lines.push(`TOTAL CONTRACT VALUE: ${fmtMoney(total)}`);
  lines.push('');
  lines.push('This document summarizes the quotation and milestones approved by both');
  lines.push('parties on the Stamped platform. It is generated for reference purposes');
  lines.push('as part of a paid add-on service and does not constitute independent');
  lines.push('legal advice — consult a qualified professional before relying on it as');
  lines.push('a binding contract.');
  lines.push('');
  lines.push('_'.repeat(30) + '          ' + '_'.repeat(30));
  lines.push('Consultant signature                     Client signature');
  return lines.join('\n');
}

function downloadTextFile(filename, content){
  const blob = new Blob([content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderLegalAgreementSection(project, myRole){
  const box = el('<div class="note-box" style="margin-top:18px;"></div>');
  box.appendChild(el(`<div class="suggestion-label" style="color:var(--gold);">Legal Agreement — paid add-on</div>`));
  if(!project.legalAgreementUnlocked){
    box.appendChild(el(`<div class="timer-note" style="margin-bottom:8px;">Generate a downloadable agreement summarizing the approved quotation and milestones, available to both parties. This is a paid add-on — a simulated ₹499 fee applies (no real payment gateway wired in, consistent with the rest of this app).</div>`));
    const btn = el('<button class="btn btn-stamp">Unlock Legal Agreement — ₹499</button>');
    btn.onclick = ()=>{
      const ok = confirm('Unlock the downloadable legal agreement for a simulated ₹499? Available to both parties once unlocked.');
      if(!ok) return;
      project.legalAgreementUnlocked = true;
      if(supabaseConfigured) persist(()=> sbUpdate('projects', project.id, { legal_agreement_unlocked: true }));
      log(project, `${myRole==='professional'?'Consultant':'Client'} unlocked the Legal Agreement add-on.`);
      render();
    };
    box.appendChild(btn);
  } else {
    box.appendChild(el(`<div class="timer-note" style="margin-bottom:8px;">Unlocked — available to both parties.</div>`));

    dlBtn.onclick = ()=> downloadTextFile(`Stamped-Agreement-${project.id}.txt`, generateLegalAgreementText(project));
    box.appendChild(dlBtn);
