  return box;
}

function renderQuotationReviewPanel(project, proposed){
  const total = proposed.reduce((s,m)=>s+(m.amount||0),0);
  const box = el('<div class="note-box" style="margin-bottom:16px;border:1.5px dashed var(--stamp);"></div>');
  box.appendChild(el(`<div class="suggestion-label">Quotation awaiting your approval — ${proposed.length} milestone${proposed.length!==1?'s':''}, ${fmtMoney(total)} total</div>`));
  const listBox = el('<div style="display:flex;flex-direction:column;gap:6px;margin:10px 0;"></div>');
  proposed.forEach(m=>{
    listBox.appendChild(el(`<div style="font-size:13px;">• <b>${escapeHtml(m.name)}</b> — ${fmtMoney(m.amount)}, due in ${escapeHtml(m.deadline)}</div>`));
  });
  box.appendChild(listBox);
  box.appendChild(el(`<div class="timer-note" style="margin-bottom:8px;">Review the details below, then approve the whole quotation together — you can't edit these terms yourself, only accept, reject, or comment.</div>`));

  const commentRow = el('<div style="display:flex;gap:8px;margin-bottom:10px;"></div>');
  const commentInput = el(`<input class="chat-input" type="text" placeholder="Leave a comment on this quotation…" style="flex:1;"/>`);
  const commentBtn = el('<button class="btn btn-ghost">Comment</button>');
  const sendComment = ()=>{
    const text = commentInput.value.trim();
    if(!text) return;
    const msg = { id: uid('msg'), sender:viewingAs, text: `💬 Quotation comment: ${text}`, ts:Date.now() };
    project.messages.push(msg);
    if(supabaseConfigured) persist(()=> sbInsert('messages', messageJsToRow(project.id, msg)));
    commentInput.value = '';
    render();
  };
  commentBtn.onclick = sendComment;
  commentInput.onkeydown = (e)=>{ if(e.key==='Enter') sendComment(); };
  commentRow.appendChild(commentInput); commentRow.appendChild(commentBtn);
  box.appendChild(commentRow);

  const errBox = el(`<div style="display:none;background:#FFE1EA;color:#DC2626;border-radius:4px;padding:8px 10px;font-size:12px;margin-bottom:8px;"></div>`);
  box.appendChild(errBox);

  const actions = el('<div class="ms-actions"></div>');
  const approveBtn = el('<button class="btn btn-success">Approve Quotation &amp; Milestones</button>');
  const rejectBtn = el('<button class="btn btn-ghost">Reject</button>');
  approveBtn.onclick = async ()=>{
    approveBtn.disabled = true; rejectBtn.disabled = true;
    try{
      if(supabaseConfigured){
        await apiApproveQuotation(project.id);
        await loadState();
      } else {
        proposed.forEach(m=>{ m.status='locked'; m.confirmedAt=Date.now(); });
        project.quotationApproved = true;
        log(project, `Client approved the quotation and all ${proposed.length} proposed milestone(s) together.`);
      }
      render();
    }catch(e){
      approveBtn.disabled = false; rejectBtn.disabled = false;
      errBox.textContent = e.message || 'Could not approve.'; errBox.style.display='block';
    }
  };
  rejectBtn.onclick = async ()=>{
    approveBtn.disabled = true; rejectBtn.disabled = true;
    try{
      if(supabaseConfigured){
        await apiRejectQuotation(project.id);
        await loadState();
      } else {
        proposed.forEach(m=>{ m.status='rejected'; });
        log(project, `Client rejected the quotation (${proposed.length} proposed milestone(s)).`);
      }
      render();
    }catch(e){
      approveBtn.disabled = false; rejectBtn.disabled = false;
      errBox.textContent = e.message || 'Could not reject.'; errBox.style.display='block';
    }
  };
  actions.appendChild(approveBtn); actions.appendChild(rejectBtn);
  box.appendChild(actions);
  return box;
}

const STATUS_LABEL = {
  proposed:['Proposed · Awaiting Client Review','s-suggested'],
  locked:['Locked · Not Started','s-locked'], in_progress:['In Progress','s-locked'],
  submitted:['Awaiting Client Review','s-submitted'], revision:['Revision Requested','s-revision'],
  paid_held:['Paid · Held In Escrow','s-paid'], released:['Released · Complete','s-released'],
  dispute1:['Dispute · Self Resolution','s-dispute'], dispute2:['Dispute · Admin Mediation','s-dispute'],
  resolved:['Dispute Resolved','s-released'], rejected:['Rejected by Client','s-disputed']
};
// Revisions are labeled R0 (original submission), R1 (first revision), R2
// (second/final revision) rather than "1/2 used".
function revisionLabel(n){ return 'R' + (n||0); }

function renderMilestoneCard(project, ms, myRole){
  const [label, cls] = STATUS_LABEL[ms.status] || ['—','s-locked'];
  const card = el(`<div class="ms-card"></div>`);
  const head = el(`<div class="ms-head">
    <div class="ms-head-left">
      <div>
        <div class="ms-name">${escapeHtml(ms.name)}</div>
        <div class="ms-amount">${fmtMoney(ms.amount)} · due in ${escapeHtml(ms.deadline)}</div>
      </div>
    </div>
    <span class="status-pill ${cls}">${label}</span>
  </div>`);
  head.onclick = ()=>{ expandedMilestone = expandedMilestone===ms.id ? null : ms.id; render(); };
  card.appendChild(head);

  if(expandedMilestone===ms.id){
    const body = el('<div class="ms-body"></div>');
    if(ms.status==='rejected'){
      body.appendChild(el(`<div class="ms-desc">${escapeHtml(ms.description||'')}</div>`));
      body.appendChild(el(`<div class="timer-note">The client rejected this milestone as part of the quotation. The consultant can propose a fresh one if terms change.</div>`));
    } else if(ms.status==='proposed' && myRole==='admin'){
      body.appendChild(el(`<div class="ms-desc">${escapeHtml(ms.description||'(no description yet)')}</div>`));
      body.appendChild(el(`<div class="timer-note">Proposed by the consultant — awaiting the client's approval. Admins observe but don't participate.</div>`));
    } else if(ms.status==='proposed' && myRole==='professional'){
      body.appendChild(renderProfessionalProposalEditor(project, ms));
    } else if(ms.status==='proposed'){
      // Client: read-only here — approval happens together for the whole
      // quotation via the panel at the top of the Milestones tab, not per item.
      body.appendChild(el(`<div class="ms-desc">${escapeHtml(ms.description||'')}</div>`));
      body.appendChild(el(`<div class="timer-note">Part of the quotation above — approve, reject, or comment on it as a whole.</div>`));
    } else {
      body.appendChild(el(`<div class="ms-desc">${escapeHtml(ms.description)}</div>`));
      body.appendChild(el(`<div class="ms-meta-row">
        <span>Review window: ${escapeHtml(ms.reviewWindow)}</span>
        <span>Revision: ${revisionLabel(ms.revisionsUsed)} (max R2)</span>
        <span>Confirmed: ${fmtTs(ms.confirmedAt)}</span>
      </div>`));
      body.appendChild(renderMilestoneActions(project, ms, myRole));
    }
    card.appendChild(body);
  }
  return card;
}

function renderProfessionalProposalEditor(project, ms){
  const wrap = el('<div></div>');
  wrap.appendChild(el(`<div class="suggestion-label">Your quotation draft — the client sees this once you save it, and approves it together with any other proposed milestones</div>`));
  const fields = el(`<div class="agreement-fields">
    <div class="field"><label>Milestone name</label><input data-f="name" value="${escapeAttr(ms.name)}"/></div>
    <div class="field"><label>Amount (₹)</label><input data-f="amount" type="number" min="0" value="${escapeAttr(ms.amount)}"/></div>
    <div class="field full"><label>Deliverable description</label><textarea data-f="description" rows="2" placeholder="What will be delivered?">${escapeHtml(ms.description)}</textarea></div>
    <div class="field"><label>Deadline</label><input data-f="deadline" value="${escapeAttr(ms.deadline)}"/></div>
    <div class="field"><label>Review window</label><input data-f="reviewWindow" value="${escapeAttr(ms.reviewWindow)}"/></div>
  </div>`);
  fields.querySelectorAll('[data-f]').forEach(inp=>{
    inp.oninput = ()=>{
      const f = inp.dataset.f;
      ms[f] = f==='amount' ? Number(inp.value)||0 : inp.value;
    };
  });
  wrap.appendChild(fields);

  const row = el('<div class="confirm-row"></div>');
  const saveBtn = el('<button class="btn btn-stamp">Save Changes</button>');
  const savedNote = el('<span class="timer-note" style="display:none;">Saved.</span>');
  saveBtn.onclick = ()=>{
    if(!ms.name.trim() || !ms.amount){ alert('Add a milestone name and amount first.'); return; }
    if(supabaseConfigured) persist(()=> sbUpdate('milestones', ms.id, milestoneJsToRow(project.id, ms)));
    savedNote.style.display=''; setTimeout(()=>{savedNote.style.display='none';},2000);
    render();
  };
  row.appendChild(saveBtn); row.appendChild(savedNote);
  const removeBtn = el('<button class="btn btn-ghost">Withdraw proposal</button>');
  removeBtn.onclick = ()=>{
    const msId = ms.id, msName = ms.name;
    project.milestones = project.milestones.filter(m=>m.id!==ms.id);
    expandedMilestone = null;
    log(project, `Proposed milestone "${msName}" was withdrawn before the client reviewed it.`);
    if(supabaseConfigured) persist(()=> sbDelete('milestones', msId));
    render();
  };
  row.appendChild(removeBtn);
  wrap.appendChild(row);
  return wrap;
}

function renderMilestoneActions(project, ms, myRole){
  const wrap = el('<div></div>');

  // locked -> professional submits work
  if(ms.status==='locked' || ms.status==='in_progress'){
    if(myRole==='professional'){
      const actions = el('<div class="ms-actions"></div>');
      const btn = el('<button class="btn btn-stamp">Upload deliverable & submit preview</button>');
      btn.onclick = ()=>{
        ms.submission = { note:'Watermarked low-res preview uploaded.', ts:Date.now(), revisionNote: ms.submission?.revisionNote || null };
        ms.status='submitted';
        log(project, `Professional submitted a watermarked preview for "${ms.name}". Full files remain locked until payment.`);
        persistMilestone(project, ms); render();
      };
      actions.appendChild(btn);
      wrap.appendChild(actions);
    } else {
      wrap.appendChild(el(`<div class="timer-note">Waiting for the professional to submit a preview of the deliverable.</div>`));
    }
  }

  // submitted -> client agrees/disagrees on preview
  if(ms.status==='submitted'){
    wrap.appendChild(el(`<div class="note-box"><b>Preview:</b> ${escapeHtml(ms.submission.note)} <span class="revision-track">— submitted ${fmtTs(ms.submission.ts)}</span></div>`));
    if(myRole==='client'){
      const actions = el('<div class="ms-actions"></div>');
      const agree = el('<button class="btn btn-success">Agree — proceed to payment</button>');
      agree.onclick = ()=>{
        ms.status='paid_pending';
        log(project, `Client approved the preview for "${ms.name}" and will be prompted to pay.`);
        persistMilestone(project, ms); render();
      };
      const disagree = el('<button class="btn btn-ghost">Disagree — request revision</button>');
      disagree.onclick = ()=>{
        const proId = userIdForRole('professional', project);
        if(ms.revisionsUsed >= 2){
          ms.status='dispute1'; ms.disputeStage=1; project.disputeStage=1;
          log(project, `Client disagreed after all free revisions were used on "${ms.name}". Dispute Stage 1 — Self Resolution triggered (48hr window).`);
          persistProjectDispute(project);
          bumpStats(proId, 0, 0, 1); // disputes entered — feeds the matching formula
          persistReputation(proId, 'professional', 0, 0, 0, 0, 0, 1);
        } else {
          ms.revisionsUsed += 1;
          ms.status='revision';
          log(project, `Client requested a revision on "${ms.name}" — now at ${revisionLabel(ms.revisionsUsed)} (max R2).`);
          bumpStats(proId, 0, 1, 0); // resubmission requested — feeds the matching formula
          persistReputation(proId, 'professional', 0, 0, 0, 0, 1, 0);
        }
        persistMilestone(project, ms); render();
      };
      actions.appendChild(agree); actions.appendChild(disagree);
      wrap.appendChild(actions);
    } else {
      wrap.appendChild(el(`<div class="timer-note">Waiting for client decision — Agree or Disagree.</div>`));
    }
  }

  if(ms.status==='paid_pending'){
    if(myRole==='client'){
      const actions = el('<div class="ms-actions"></div>');
      const commission = project.tier==='pro' ? 0.02 : 0.05;
      const payBtn = el(`<button class="btn btn-stamp">Pay ${fmtMoney(ms.amount)} via ${project.tier==='pro'?'Razorpay':'Razorpay'} Route</button>`);
      payBtn.onclick = ()=>{
        ms.status='paid_held'; ms.paymentHeldAt = Date.now();
        log(project, `Payment of ${fmtMoney(ms.amount)} collected and held in platform wallet (commission ${(commission*100).toFixed(0)}% deducted at transfer). High-res files unlocked.`);
        persistMilestone(project, ms); render();
      };
      actions.appendChild(payBtn);
      wrap.appendChild(actions);
      wrap.appendChild(el(`<div class="timer-note">Commission on release: ${(commission*100).toFixed(0)}% (${project.tier} tier)</div>`));
    } else {
      wrap.appendChild(el(`<div class="timer-note">Client is being prompted to pay. Funds will be held in escrow, not with you directly, until final approval.</div>`));
    }
  }

  // revision -> back to professional to resubmit
  if(ms.status==='revision'){
    wrap.appendChild(el(`<div class="note-box">Revision requested${ms.submission?.revisionNote?': '+escapeHtml(ms.submission.revisionNote):''}. Now at ${revisionLabel(ms.revisionsUsed)} (max R2).</div>`));
    if(myRole==='professional'){
      const actions = el('<div class="ms-actions"></div>');
      const btn = el('<button class="btn btn-stamp">Re-submit revised preview</button>');
      btn.onclick = ()=>{
        ms.submission = { note:'Revised watermarked preview uploaded.', ts:Date.now() };
        ms.status='submitted';
        log(project, `Professional re-submitted a revised preview for "${ms.name}".`);
        persistMilestone(project, ms); render();
      };
      actions.appendChild(btn);
      wrap.appendChild(actions);
    } else {
      wrap.appendChild(el(`<div class="timer-note">Waiting for the professional to re-submit.</div>`));
    }
  }

  // paid_held -> client final approval or 48hr auto release
  if(ms.status==='paid_held'){
    wrap.appendChild(el(`<div class="note-box"><b>High-resolution files unlocked.</b> Paid ${fmtMoney(ms.amount)} on ${fmtTs(ms.paymentHeldAt)}. Auto-releases after 48 hours if no issue is raised.</div>`));
    const actions = el('<div class="ms-actions"></div>');
    if(myRole==='client'){
      const confirmBtn = el('<button class="btn seal"><span class="seal-mark" style="display:none"></span>Confirm satisfactory — release payment</button>');
      confirmBtn.classList.add('btn-success');
      confirmBtn.onclick = ()=>{ releaseMilestonePayment(project, ms, 'Client confirmed the delivery was satisfactory.'); };
      actions.appendChild(confirmBtn);
    } else {
      actions.appendChild(el('<div class="timer-note">Waiting for client final approval, or 48-hour auto-release.</div>'));
    }
    const simBtn = el('<button class="btn btn-ghost">Simulate 48hr window passing (no issue raised)</button>');
    simBtn.onclick = ()=>{ releaseMilestonePayment(project, ms, 'No issue was raised within the 48-hour review window — payment auto-released.'); };
    actions.appendChild(simBtn);
    wrap.appendChild(actions);
  }

  if(ms.status==='released'){
    wrap.appendChild(el(`<div class="note-box seal"><span class="seal-mark">STAMP<br>✓</span><div><b>Milestone complete.</b> ${fmtMoney(ms.amount)} released to professional on ${fmtTs(ms.releasedAt)}. Reputation updated for both parties.</div></div>`));
  }

  // dispute stage 1
  if(ms.status==='dispute1'){
    wrap.appendChild(el(`<div class="note-box">Stage 1 — Self Resolution. Stamped shows both parties a side-by-side of the original agreement vs. submitted work. 48 hours to resolve directly in chat.</div>`));
    const actions = el('<div class="ms-actions"></div>');
    const resolveBtn = el('<button class="btn btn-success">Mark resolved in chat — resume project</button>');
    resolveBtn.onclick = ()=>{
      ms.status='revision'; ms.disputeStage=0; project.disputeStage=0;
      const proId1 = userIdForRole('professional',project), cliId1 = userIdForRole('client',project);
      bumpScore(proId1,'professional',2);
      bumpScore(cliId1,'client',2);
      log(project, `Dispute on "${ms.name}" resolved directly between parties at Stage 1. Project resumes.`);
      persistMilestone(project, ms); persistProjectDispute(project);
      persistReputation(proId1, 'professional', 2); persistReputation(cliId1, 'client', 2);
      render();
    };
    const escalateBtn = el('<button class="btn btn-ghost">Escalate — Stage 2 Admin Mediation</button>');
    escalateBtn.onclick = ()=>{
      ms.status='dispute2'; ms.disputeStage=2; project.disputeStage=2;
      log(project, `Stage 1 self-resolution failed on "${ms.name}". Escalated to Stage 2 — Admin Mediation.`);
      persistMilestone(project, ms); persistProjectDispute(project); render();
    };
    actions.appendChild(resolveBtn); actions.appendChild(escalateBtn);
    wrap.appendChild(actions);
  }

  // dispute stage 2 - admin mediation (either role can act as "admin" for demo)
  if(ms.status==='dispute2'){
    wrap.appendChild(el(`<div class="note-box">Stage 2 — Admin Mediation. Stamped's core team reviews the full record: chat, agreement, all submissions and revision notes. Ruling is final and binding.</div>`));
    if(myRole==='admin'){
      const actions = el('<div class="admin-ruling"></div>');
      const ruleFull = el('<button class="btn btn-stamp">Rule: full payment to consultant</button>');
      ruleFull.onclick = ()=> adminRule(project, ms, 'full_professional');
      const ruleSplit = el('<button class="btn btn-ghost">Rule: partial payment (50/50)</button>');
      ruleSplit.onclick = ()=> adminRule(project, ms, 'partial');
      const ruleRefund = el('<button class="btn btn-ghost">Rule: full refund to client</button>');
      ruleRefund.onclick = ()=> adminRule(project, ms, 'full_client');
      actions.appendChild(ruleFull); actions.appendChild(ruleSplit); actions.appendChild(ruleRefund);
      wrap.appendChild(actions);
    } else {
      wrap.appendChild(el('<div class="timer-note">Waiting for a Stamped admin to review the case and issue a binding ruling.</div>'));
    }
  }

  if(ms.status==='resolved'){
    wrap.appendChild(el(`<div class="note-box seal"><span class="seal-mark">STAMP<br>✓</span><div><b>Dispute resolved.</b> ${escapeHtml(ms.rulingNote||'')}</div></div>`));
  }

  return wrap;
}

function releaseMilestonePayment(project, ms, note){
  ms.status='released'; ms.releasedAt = Date.now();
  const commission = project.tier==='pro' ? 0.02 : 0.05;
  const proId = userIdForRole('professional',project), cliId = userIdForRole('client',project);
  state.users[proId].completedClean = (state.users[proId].completedClean||0)+1;
  state.users[cliId].completedClean = (state.users[cliId].completedClean||0)+1;
  bumpScore(proId,'professional', 6); bumpScore(cliId,'client', 4);
  bumpStats(proId, ms.amount, 0, 0); // turnover — gross contract value, feeds the matching formula
  log(project, `${note} ${fmtMoney(Math.round(ms.amount*(1-commission)))} released to professional (${(commission*100).toFixed(0)}% commission retained). Reputation updated.`);
  persistMilestone(project, ms);
  persistReputation(proId, 'professional', 6, 1, 0, ms.amount, 0, 0);
  persistReputation(cliId, 'client', 4, 1, 0);
  render();
}

function adminRule(project, ms, ruling){
  const proId = userIdForRole('professional',project), cliId = userIdForRole('client',project);
  let note='';
  if(ruling==='full_professional'){
    note = `Full payment of ${fmtMoney(ms.amount)} awarded to professional.`;
    bumpScore(cliId,'client',-8); state.users[cliId].disputesLost=(state.users[cliId].disputesLost||0)+1;
    persistReputation(cliId, 'client', -8, 0, 1);
  } else if(ruling==='full_client'){
    note = `Full refund of ${fmtMoney(ms.amount)} returned to client.`;
    bumpScore(proId,'professional',-8); state.users[proId].disputesLost=(state.users[proId].disputesLost||0)+1;
    persistReputation(proId, 'professional', -8, 0, 1);
  } else {
    note = `Payment split 50/50 between professional and client.`;
    bumpScore(proId,'professional',-2); bumpScore(cliId,'client',-2);
    persistReputation(proId, 'professional', -2, 0, 0);
    persistReputation(cliId, 'client', -2, 0, 0);
  }
  ms.status='resolved'; ms.rulingNote=note; ms.disputeStage=0; project.disputeStage=0;
  log(project, `Admin ruling issued on "${ms.name}": ${note} Ruling is final and binding.`);
  persistMilestone(project, ms); persistProjectDispute(project);
  render();
}

/* ---------- ledger ---------- */
function renderLedger(project){
  const wrap = el('<div class="ledger"></div>');
  [...project.ledger].reverse().forEach(entry=>{
    wrap.appendChild(el(`<div class="ledger-entry">
      <div class="ledger-ts">${fmtTs(entry.ts)}</div>
      <div class="ledger-text">${escapeHtml(entry.text)}</div>
    </div>`));
  });
  return wrap;
}

    m.innerHTML = `<h3>Start a new project</h3><p>You'll connect as ${roleLabel(me.role).toLowerCase()}. All future communication stays inside Stamped.</p>`;
    if(candidates.length===0){
      m.innerHTML += `<div class="note-box">No other accounts registered yet. Use the <b>+ Register</b> button in the top bar to create a ${wantRole} account first, then come back here to connect.</div>`;
      const actions = el('<div class="modal-actions"></div>');
      const close = el('<button class="btn btn-ghost">Close</button>');
      close.onclick = ()=>{ modal=null; render(); };
      actions.appendChild(close);
      m.appendChild(actions);
      return overlay;
    }

    const f1 = el(`<div class="field"><label>Project title</label><input id="np-title" placeholder="e.g. Homepage redesign"/></div>`);
    const otherSelect = el(`<select id="np-other" style="padding:8px;border-radius:4px;border:1px solid #E3DFF7;background:var(--parchment-2);font-family:var(--sans)"></select>`);
    candidates.forEach(id=>{
      const u = getUser(id);
      otherSelect.appendChild(el(`<option value="${id}">${u.name} · ${roleLabel(u.role)}</option>`));
    });
    const f2 = el(`<div class="field"><label>Connect with</label></div>`);
    f2.appendChild(otherSelect);
    m.appendChild(f1); m.appendChild(f2);
    const actions = el('<div class="modal-actions"></div>');
    const cancel = el('<button class="btn btn-ghost">Cancel</button>');
    cancel.onclick = ()=>{ modal=null; render(); };
    const create = el('<button class="btn btn-stamp">Connect</button>');
    create.onclick = ()=>{
      const title = document.getElementById('np-title').value.trim() || 'Untitled Project';
      const tier = 'free';
      const otherId = document.getElementById('np-other').value;
      const clientId = me.role==='professional' ? otherId : viewingAs;
      const clientUser = getUser(clientId);
      const initialEntry = { id: uid('ledger'), ts:Date.now(), text:`Project created and connected on Stamped.` };
      const proj = {
        id: uid('proj'), title, tier,
        professional: me.role==='professional' ? viewingAs : otherId,
        client: clientId,
        createdAt: Date.now(), messages:[], milestones:[], ledger:[initialEntry], disputeStage:0,
        zone: clientUser.zone||null, region: clientUser.region||null
      };
      state.projects.push(proj);
      currentProjectId = proj.id; currentTab='chat';
      modal=null;
      if(supabaseConfigured) persist(async ()=>{
        await sbInsert('projects', projectJsToRow(proj));
        await sbInsert('ledger_entries', ledgerJsToRow(proj.id, initialEntry));
      });
      render();
    };
    actions.appendChild(cancel); actions.appendChild(create);
    m.appendChild(actions);
  }
  return overlay;
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============================= INIT ============================= */
(async function init(){
  if(supabaseConfigured){
    loadSessionFromStorage();
    if(session){
      const validUserId = await apiValidateSession();
      if(!validUserId){
        // Token expired or was revoked — don't pretend we're still logged in.
        session = null; saveSessionToStorage();
      } else {
        viewingAs = session.userId;
      }
    }
  }
  await loadState();
  currentProjectId = state.projects[0]?.id || null;
  render();
})();
</script>
</body>
</html>
